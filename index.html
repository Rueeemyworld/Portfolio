const NOTES=[
  {id:'cold-start',cat:'Product',title:{en:'The Cold Start Problem: Life or Death for Dating Apps',cn:'冷启动问题：约会App的生死线'},tags:{en:['Cold Start','Growth','Dating Apps','Network Effects'],cn:['冷启动','增长','约会App','网络效应']},date:'2026-03-20',excerpt:{en:'No users means no matches, no matches means no retention. The classic chicken-and-egg problem and how AIMM, Tinder, and Bumble each tried to break through.',cn:'没有用户就没有匹配，没有匹配就留不住用户。约会App面临的经典鸡生蛋问题。'},content:{en:'<p>The cold start problem in dating apps is among the most brutal in all two-sided markets.</p><p><strong>Core paradox</strong>: not enough users → low match quality → churn → even fewer users. Once this death spiral starts, it\'s nearly irreversible.</p><p>Tinder\'s solution was the <span class="internal-link" data-link="tinder-campus">campus party strategy</span>. Bumble used women-first mechanics.</p><p>AIMM failed because it tried to use AI quality to compensate for insufficient quantity, but the <span class="internal-link" data-link="ai-matching-paradox">AI matching paradox</span> tells us — you can\'t fish in an empty pond.</p><p><strong>Key lesson</strong>: The battleground is distribution, not algorithms.</p>',cn:'<p>约会App的冷启动是所有双边市场中最残酷的一种。</p><p><strong>核心矛盾</strong>：没有足够多的异性用户 → 匹配质量低 → 用户流失 → 更少的用户。</p><p>Tinder的解法是 <span class="internal-link" data-link="tinder-campus">校园派对策略</span>。Bumble靠女性优先机制。</p><p>AIMM试图用AI质量弥补用户数量不足，但 <span class="internal-link" data-link="ai-matching-paradox">AI匹配悖论</span> 告诉我们——池子里没鱼也钓不上来。</p><p><strong>关键教训</strong>：战场在distribution，不在algorithm。</p>'},links:['tinder-campus','ai-matching-paradox','aimm-case']},
  {id:'ai-matching-paradox',cat:'Thinking',title:{en:'The AI Matching Paradox: Better Algorithms, Worse Experience?',cn:'AI匹配悖论：算法越好，体验越差？'},tags:{en:['AI','Matching Algorithm','Product Philosophy'],cn:['AI','匹配算法','产品哲学']},date:'2026-03-18',excerpt:{en:'When AI makes matching hyper-precise, users might actually be less satisfied — they want discovery, not optimization.',cn:'当AI把匹配做到极致精准，用户反而可能更不满意——人类想要的不是"最优解"，而是"发现的快感"。'},content:{en:'<p>A counterintuitive observation: users say they want "precise matching" but behaviorally prefer "unexpected discovery."</p><p>This is exactly the mistake <span class="internal-link" data-link="aimm-case">AIMM</span> made — too many decisions for users. A textbook case of <span class="internal-link" data-link="product-paternalism">paternalistic design</span>.</p>',cn:'<p>一个反直觉的观察：用户嘴上说要"精准匹配"，行为上却更享受"意外发现"。</p><p>这也是 <span class="internal-link" data-link="aimm-case">AIMM</span> 犯的错——替用户做了太多决定。<span class="internal-link" data-link="product-paternalism">父权式设计</span> 的典型案例。</p>'},links:['cold-start','aimm-case','product-paternalism']},
  {id:'aimm-case',cat:'Product',title:{en:'AIMM Post-Mortem: From Downey Documentary to Obscurity',cn:'AIMM案例复盘：从唐尼纪录片到无人问津'},tags:{en:['Case Study','AIMM','Dating App','Failure'],cn:['案例分析','AIMM','约会App','失败']},date:'2026-03-15',excerpt:{en:'Featured on CNN, Fox, and Robert Downey Jr.\'s documentary — so why did this AI matchmaker still die?',cn:'上了CNN、Fox、唐尼纪录片的AI媒人App，为什么还是死了？'},content:{en:'<p>AIMM was created in 2016 by Denver programmer Kevin Teman.</p><p><strong>Three fatal mistakes</strong>:</p><p>1. <span class="internal-link" data-link="cold-start">Cold start</span> — 3 years, still only in Denver.</p><p>2. <span class="internal-link" data-link="indie-dev-trap">Indie dev trap</span> — no funding = no marketing = no growth.</p><p>3. <span class="internal-link" data-link="product-paternalism">Anti-human design</span> — forced a week-long onboarding; gender-biased UX.</p><p><strong>Core lesson</strong>: Tech isn\'t the moat. Distribution is.</p>',cn:'<p>AIMM是2016年Denver程序员Kevin Teman创建的语音AI媒人App。</p><p><strong>三个致命错误</strong>：</p><p>1. <span class="internal-link" data-link="cold-start">冷启动</span>——3年没走出Denver。</p><p>2. <span class="internal-link" data-link="indie-dev-trap">独立开发者陷阱</span>——没融资=没增长。</p><p>3. <span class="internal-link" data-link="product-paternalism">产品设计反人性</span>——要求一周onboarding，性别歧视设计。</p><p><strong>核心教训</strong>：技术不是壁垒，分发才是。</p>'},links:['cold-start','ai-matching-paradox','product-paternalism','indie-dev-trap']},
  {id:'product-paternalism',cat:'Thinking',title:{en:'Paternalism in Product Design: When AI Decides for You',cn:'产品设计中的父权主义：当AI替你做决定'},tags:{en:['Product Design','UX','AI Ethics'],cn:['产品设计','UX','AI伦理']},date:'2026-03-12',excerpt:{en:'AIMM wouldn\'t let women reject matches. Where\'s the line between personalization and control?',cn:'AIMM不让女性拒绝匹配——产品替用户做决定的边界在哪？'},content:{en:'<p>Good recommendation systems give you choices. Bad ones make choices for you.</p><p>The best AI products <span class="internal-link" data-link="ai-matching-paradox">expand possibilities</span> rather than narrow them.</p>',cn:'<p>好的推荐系统给你选择，坏的推荐系统替你选择。</p><p>最好的AI产品是那些 <span class="internal-link" data-link="ai-matching-paradox">扩展可能性</span> 而不是收窄可能性的产品。</p>'},links:['ai-matching-paradox','aimm-case']},
  {id:'tinder-campus',cat:'Product',title:{en:'Tinder\'s Campus Strategy: The Cold Start Playbook',cn:'Tinder校园策略：冷启动教科书'},tags:{en:['Tinder','Cold Start','Growth Strategy'],cn:['Tinder','冷启动','增长策略']},date:'2026-03-08',excerpt:{en:'How Tinder went from zero to full US campus coverage in one year. Density before scale.',cn:'Tinder怎么一年内覆盖全美校园？密度优先于规模。'},content:{en:'<p>Tinder\'s core: <strong>density before scale</strong>. Focus on one campus (USC), create density, then expand.</p><p>This aligns with <span class="internal-link" data-link="cold-start">cold start theory</span>. AIMM failed because it scattered sand across the ocean.</p>',cn:'<p>Tinder的核心：<strong>密度优先于规模</strong>。聚焦USC一个校园，制造密度，再外扩。</p><p>这跟 <span class="internal-link" data-link="cold-start">冷启动理论</span> 完全吻合。AIMM的失败是因为在大海里撒了一把沙。</p>'},links:['cold-start','aimm-case']},
  {id:'indie-dev-trap',cat:'Thinking',title:{en:'The Indie Dev Trap: Technical Ability ≠ Startup Ability',cn:'独立开发者陷阱：技术能力 ≠ 创业能力'},tags:{en:['Indie Dev','Startup','Fundraising','Growth'],cn:['独立开发者','创业','融资','增长']},date:'2026-03-05',excerpt:{en:'Knowing how to code doesn\'t mean knowing how to build a company. AIMM\'s founder reveals the classic dilemma.',cn:'会写代码不等于会做公司。AIMM创始人揭示了独立开发者创业的典型困境。'},content:{en:'<p>Kevin Teman was a good programmer but not a good entrepreneur.</p><p>No funding = no marketing = no growth. Media coverage ≠ user retention. Same story as <span class="internal-link" data-link="cold-start">cold start</span>.</p>',cn:'<p>Kevin Teman是个好程序员，但不是好的创业者。</p><p>没融资=没市场预算=没增长。媒体曝光 ≠ 用户留存。跟 <span class="internal-link" data-link="cold-start">冷启动</span> 是一回事。</p>'},links:['aimm-case','cold-start']},
  {id:'swipe-fatigue',cat:'Product',title:{en:'Swipe Fatigue: The Structural Crisis in Dating Apps',cn:'Swipe Fatigue：约会App行业的结构性危机'},tags:{en:['Dating Apps','Industry Analysis','UX'],cn:['约会App','行业分析','用户体验']},date:'2026-02-28',excerpt:{en:'75% of users feel burnout. Tinder lost 1.5M+ paying users from peak. The swiping paradigm may be obsolete.',cn:'75%用户感到倦怠，Tinder付费用户从峰值下降150万+。滑动范式可能已过时。'},content:{en:'<p>Over 75% of dating app users experience swipe fatigue. The <span class="internal-link" data-link="ai-matching-paradox">AI matching paradox</span> reminds us: the solution may not be better algorithms, but an entirely different interaction model.</p>',cn:'<p>超过75%的约会App用户体验到"滑动倦怠"。<span class="internal-link" data-link="ai-matching-paradox">AI匹配悖论</span> 提醒我们：解决方案可能不在于更好的算法，而在于完全不同的交互方式。</p>'},links:['ai-matching-paradox','cold-start']},
  {id:'content-as-gtm',cat:'Creative',title:{en:'Content as GTM: Growing Through Stories',cn:'内容即GTM：用故事做增长'},tags:{en:['GTM','Content Strategy','Growth','Personal Brand'],cn:['GTM','内容策略','增长','个人品牌']},date:'2026-02-20',excerpt:{en:'No paid acquisition? Use content itself as your go-to-market strategy.',cn:'不花钱买量，用内容本身作为go-to-market策略。'},content:{en:'<p><strong>Core hypothesis</strong>: High-quality analysis content is itself the best acquisition channel.</p><p>This contrasts with the <span class="internal-link" data-link="indie-dev-trap">indie developer</span> dilemma — AIMM had tech but no distribution.</p>',cn:'<p><strong>核心假设</strong>：高质量的行业分析内容，本身就是最好的获客渠道。</p><p>这跟 <span class="internal-link" data-link="indie-dev-trap">独立开发者</span> 的困境形成对比——AIMM有技术没分发。</p>'},links:['indie-dev-trap','aimm-case']},
  {id:'bilingual-brand',cat:'Creative',title:{en:'Building a Bilingual Personal Brand',cn:'双语个人品牌：在中英文之间找到声音'},tags:{en:['Personal Brand','Bilingual','Writing'],cn:['个人品牌','双语','写作']},date:'2026-02-15',excerpt:{en:'As a bilingual creator, how do you switch languages without losing your voice?',cn:'作为中英双语创作者，如何在两种语言之间切换而不失去风格？'},content:{en:'<p>Bilingual creation isn\'t translation — it\'s <strong>telling different facets of the same story in different languages</strong>.</p>',cn:'<p>双语创作不是翻译，是<strong>用不同的语言讲同一个故事的不同面</strong>。</p>'},links:['content-as-gtm']},
  {id:'ai-loneliness',cat:'Thinking',title:{en:'The More Advanced the Tech, the Lonelier We Get?',cn:'技术越发达，人越孤独？'},tags:{en:['AI','Loneliness','Philosophy','Social'],cn:['AI','孤独','哲学','社交']},date:'2026-02-10',excerpt:{en:'When AI can perfectly simulate companionship, do we still need real human connection?',cn:'当AI可以完美模拟陪伴，我们还需要真人连接吗？'},content:{en:'<p>Central thesis: <strong>Is technology connecting us, or replacing connection itself?</strong></p><p><strong>Imperfection IS the essence of connection.</strong> The friction, misunderstandings, and repair — the parts AI can\'t simulate — are what make us human.</p>',cn:'<p>核心命题：<strong>技术究竟是在连接人，还是在替代连接本身？</strong></p><p><strong>不完美才是连接的本质</strong>。关系中的摩擦、误解、修复——这些AI无法模拟的部分，才是让我们成为人的东西。</p>'},links:['ai-matching-paradox','product-paternalism']}
];

let currentView='cards',activeTag=null,searchQuery='',selectedWikiNote=null;

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>{
    LANG=b.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.documentElement.lang=LANG==='en'?'en':'zh';
    renderAll();
  }));
  renderAll();
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.kb-view').forEach(v=>v.classList.remove('active'));
    currentView=b.dataset.view;
    document.getElementById('view-'+currentView).classList.add('active');
    if(currentView==='garden')setTimeout(renderGarden,50);
  }));
  document.getElementById('kb-search').addEventListener('input',e=>{searchQuery=e.target.value;renderKB()});
  document.getElementById('kb-tags').addEventListener('click',e=>{if(e.target.classList.contains('kb-tag')){const tg=e.target.dataset.tag;activeTag=activeTag===tg?null:tg;renderKB()}});
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
  const secs=['portfolio','knowledge','about'];const lnks=document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll',()=>{let c='';secs.forEach(id=>{const el=document.getElementById(id);if(el&&el.getBoundingClientRect().top<200)c=id});lnks.forEach(l=>{l.classList.remove('active');if(l.getAttribute('href')==='#'+c)l.classList.add('active')})});
});

function renderAll(){
  const u=UI[LANG];
  // Static text
  document.querySelectorAll('[data-en]').forEach(el=>{el.textContent=el.getAttribute('data-'+LANG)});
  document.getElementById('hero-h1').innerHTML=u.heroH1;
  document.getElementById('hero-desc').innerHTML=u.heroDesc;
  document.getElementById('hero-ctas').innerHTML='<a href="#portfolio" class="btn btn-primary">'+u.heroBtn1+'</a><a href="#knowledge" class="btn btn-outline">'+u.heroBtn2+'</a>';
  document.getElementById('portfolio-title').innerHTML=u.portfolioTitle;
  document.getElementById('knowledge-title').innerHTML=u.knowledgeTitle;
  document.getElementById('about-title').innerHTML=u.aboutTitle;
  document.getElementById('kb-search').placeholder=u.searchPH;
  // Wiki default
  const wc=document.getElementById('wiki-content');
  if(!selectedWikiNote)wc.innerHTML='<h2>'+u.wikiDefault+'</h2><div class="meta">'+u.wikiDefaultMeta+'</div><div class="body"><p>'+u.wikiDefaultBody+'</p></div>';
  // About
  document.getElementById('about-body').innerHTML='<p style="font-size:18px;line-height:1.9;color:var(--text-secondary);margin-bottom:20px">'+u.aboutP1+'</p><p style="font-size:16px;line-height:1.9;color:var(--text-secondary);margin-bottom:20px">'+u.aboutP2+'</p><p style="font-size:16px;line-height:1.9;color:var(--text-secondary);margin-bottom:32px">'+u.aboutP3+'</p><div style="display:flex;gap:12px;flex-wrap:wrap"><a href="mailto:your@email.com" class="btn btn-primary">'+u.aboutBtn1+'</a><a href="#" class="btn btn-outline">'+u.aboutBtn2+'</a><a href="#" class="btn btn-outline">'+u.aboutBtn3+'</a></div>';
  // Garden legend
  document.getElementById('garden-legend').innerHTML=Object.entries(CAT_COLORS).map(([k,v])=>'<div class="garden-legend-item"><div class="legend-dot" style="background:'+v+'"></div> '+catD(k)+'</div>').join('');
  renderProjects();
  renderKB();
  if(selectedWikiNote)selectWikiNote(selectedWikiNote);
}

function renderProjects(){
  document.getElementById('portfolio-grid').innerHTML=PROJECTS.map((p,i)=>{
    let ch='';
    if(p.chart){const c=p.cc?'background:'+p.cc:'';const lb=t(p.cl);ch='<div class="mini-chart"><div class="chart-bars">'+p.chart.map(h=>'<div class="chart-bar" style="height:'+h+'%;'+c+'"></div>').join('')+'</div><div class="chart-label"><span>'+lb[0]+'</span><span>'+lb[1]+'</span><span>'+lb[2]+'</span></div></div>'}
    return '<div class="project-card animate-in delay-'+(i+1)+'"><div class="project-cover"><div class="cover-pattern '+p.cover+'"><div class="cover-label">'+t(p.label)+'<span class="sub">'+p.sub+'</span></div></div></div><div class="project-body"><div class="project-type">'+p.type+'</div><div class="project-name">'+t(p.name)+'</div><div class="project-desc">'+t(p.desc)+'</div>'+ch+'<div class="project-tags">'+t(p.tags).map(tg=>'<span class="ptag">'+tg+'</span>').join('')+'</div></div></div>'
  }).join('');
}

function renderKB(){renderTags();renderCards();renderWikiSidebar();renderBlog()}
function filtered(){return NOTES.filter(n=>{const tgs=t(n.tags);const mt=!activeTag||tgs.includes(activeTag);const q=searchQuery.toLowerCase();const ms=!q||t(n.title).toLowerCase().includes(q)||t(n.excerpt).toLowerCase().includes(q)||tgs.some(x=>x.toLowerCase().includes(q));return mt&&ms})}
function allTags(){const s=new Set();NOTES.forEach(n=>t(n.tags).forEach(x=>s.add(x)));return Array.from(s).sort()}
function renderTags(){document.getElementById('kb-tags').innerHTML=allTags().map(tg=>'<button class="kb-tag'+(activeTag===tg?' active':'')+'" data-tag="'+tg+'">'+tg+'</button>').join('')}
function renderCards(){document.getElementById('cards-grid').innerHTML=filtered().map(n=>'<div class="kb-card" onclick="openNote(\''+n.id+'\')"><div class="kb-card-cat" style="color:'+CAT_COLORS[n.cat]+'">'+catD(n.cat)+'</div><div class="kb-card-title">'+t(n.title)+'</div><div class="kb-card-excerpt">'+t(n.excerpt)+'</div><div class="kb-card-meta"><div class="kb-card-tags">'+t(n.tags).slice(0,3).map(x=>'<span>'+x+'</span>').join('')+'</div><div class="kb-card-date">'+n.date+'</div></div></div>').join('')}
function renderWikiSidebar(){const ns=filtered();const cs={};ns.forEach(n=>{if(!cs[n.cat])cs[n.cat]=[];cs[n.cat].push(n)});document.getElementById('wiki-sidebar').innerHTML=Object.entries(cs).map(([c,items])=>'<div class="wiki-cat-title">'+catD(c)+'</div>'+items.map(n=>'<div class="wiki-link'+(selectedWikiNote===n.id?' active':'')+'" onclick="selectWikiNote(\''+n.id+'\')">'+t(n.title)+'</div>').join('')).join('')}
function selectWikiNote(id){selectedWikiNote=id;const n=NOTES.find(x=>x.id===id);if(!n)return;const bl=NOTES.filter(x=>x.links&&x.links.includes(id));const u=UI[LANG];document.getElementById('wiki-content').innerHTML='<h2>'+t(n.title)+'</h2><div class="meta"><span style="color:'+CAT_COLORS[n.cat]+'">'+catD(n.cat)+'</span><span>'+n.date+'</span><span>'+t(n.tags).join(' · ')+'</span></div><div class="body">'+t(n.content)+'</div>'+(bl.length?'<div class="backlinks"><h4>'+u.referencedBy+'</h4>'+bl.map(b=>'<span class="backlink-item" onclick="selectWikiNote(\''+b.id+'\')">'+t(b.title)+'</span>').join('')+'</div>':'');document.querySelectorAll('#wiki-content .internal-link').forEach(l=>l.addEventListener('click',()=>selectWikiNote(l.dataset.link)));renderWikiSidebar()}
function renderBlog(){document.getElementById('blog-list').innerHTML=filtered().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(n=>'<div class="blog-item" onclick="openNote(\''+n.id+'\')"><div class="blog-date">'+n.date+' · '+catD(n.cat)+'</div><div class="blog-title">'+t(n.title)+'</div><div class="blog-excerpt">'+t(n.excerpt)+'</div></div>').join('')}

function renderGarden(){const cv=document.getElementById('garden-canvas'),ctx=cv.getContext('2d'),ct=cv.parentElement,tt=document.getElementById('garden-tooltip');cv.width=ct.clientWidth*2;cv.height=ct.clientHeight*2;cv.style.width=ct.clientWidth+'px';cv.style.height=ct.clientHeight+'px';ctx.scale(2,2);const W=ct.clientWidth,H=ct.clientHeight;const nodes=NOTES.map((n,i)=>{const a=(i/NOTES.length)*Math.PI*2,r=140+Math.random()*80;return{...n,x:W/2+Math.cos(a)*r+(Math.random()-.5)*60,y:H/2+Math.sin(a)*r+(Math.random()-.5)*60,r:8+(n.links?n.links.length*3:0),vx:0,vy:0}});for(let it=0;it<80;it++)for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy)||1,f=800/(d*d);nodes[i].vx-=(dx/d)*f;nodes[i].vy-=(dy/d)*f;nodes[j].vx+=(dx/d)*f;nodes[j].vy+=(dy/d)*f}nodes[i].vx+=(W/2-nodes[i].x)*.002;nodes[i].vy+=(H/2-nodes[i].y)*.002;if(nodes[i].links)nodes[i].links.forEach(lid=>{const l=nodes.find(x=>x.id===lid);if(l){nodes[i].vx+=(l.x-nodes[i].x)*.003;nodes[i].vy+=(l.y-nodes[i].y)*.003}});nodes[i].x+=nodes[i].vx*.3;nodes[i].y+=nodes[i].vy*.3;nodes[i].vx*=.85;nodes[i].vy*=.85;nodes[i].x=Math.max(60,Math.min(W-60,nodes[i].x));nodes[i].y=Math.max(50,Math.min(H-50,nodes[i].y))}ctx.clearRect(0,0,W,H);nodes.forEach(n=>{if(n.links)n.links.forEach(lid=>{const tg=nodes.find(x=>x.id===lid);if(tg){ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(tg.x,tg.y);ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;ctx.stroke()}})});nodes.forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=CAT_COLORS[n.cat]||'#888';ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#1A1A18';ctx.font='500 11px "DM Sans",sans-serif';ctx.textAlign='center';const lb=t(n.title);ctx.fillText(lb.length>16?lb.slice(0,15)+'…':lb,n.x,n.y+n.r+16)});cv.onmousemove=e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let h=null;nodes.forEach(n=>{if(Math.sqrt((mx-n.x)**2+(my-n.y)**2)<n.r+4)h=n});if(h){tt.textContent=t(h.title);tt.style.left=(h.x+16)+'px';tt.style.top=(h.y-16)+'px';tt.style.opacity=1;cv.style.cursor='pointer'}else{tt.style.opacity=0;cv.style.cursor='grab'}};cv.onclick=e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;nodes.forEach(n=>{if(Math.sqrt((mx-n.x)**2+(my-n.y)**2)<n.r+4)openNote(n.id)})}}

function openNote(id){const n=NOTES.find(x=>x.id===id);if(!n)return;const bl=NOTES.filter(x=>x.links&&x.links.includes(id));const u=UI[LANG];document.getElementById('modal-content').innerHTML='<h2>'+t(n.title)+'</h2><div class="meta" style="color:'+CAT_COLORS[n.cat]+'">'+catD(n.cat)+' · '+n.date+' · '+t(n.tags).join(' · ')+'</div><div class="content">'+t(n.content)+'</div>'+(n.links&&n.links.length?'<div class="note-links"><h4>'+u.relatedNotes+'</h4>'+n.links.map(lid=>{const l=NOTES.find(x=>x.id===lid);return l?'<span class="backlink-item" onclick="openNote(\''+lid+'\')">'+t(l.title)+'</span>':''}).join('')+'</div>':'')+(bl.length?'<div class="note-links" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border-light)"><h4>'+u.referencedBy+'</h4>'+bl.map(b=>'<span class="backlink-item" onclick="openNote(\''+b.id+'\')">'+t(b.title)+'</span>').join('')+'</div>':'');document.querySelectorAll('#modal-content .internal-link').forEach(l=>l.addEventListener('click',()=>openNote(l.dataset.link)));document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow=''}
</script>
</body>
